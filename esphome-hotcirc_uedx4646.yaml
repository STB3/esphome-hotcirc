esphome:
  name: esphome-hotcirc-uedx4646
  name_add_mac_suffix: false
  comment: HotCirc hot water circulation controller
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.arduino.memory_type: qio_opi
  on_boot:
    priority: 600  # Run early, before components initialize
    then:
      # FIRST: Power on LCD immediately.
      # FIX #14: GPIO17 was claimed twice (raw ESP-IDF gpio_* calls here AND
      # the lcd_power output component below). The output component's setup
      # runs at HARDWARE priority (800) and is therefore already initialized
      # when on_boot(600) executes - so we simply use it.
      - output.turn_on: lcd_power
      - lambda: |-
          ESP_LOGI("lcd", "LCD module power supply enabled (GPIO17 HIGH)");
      - lambda: |-
          // Structure to store IP address in flash (must be trivially copyable)
          struct IpAddressStorage {
            char ip[16];  // Max 15 chars for IP + null terminator
          };

          // Load smart plug IP from flash preferences
          auto pref = global_preferences->make_preference<IpAddressStorage>(fnv1_hash("plug_ip"));
          IpAddressStorage stored_ip;

          if (pref.load(&stored_ip)) {
            id(smart_plug_ip) = std::string(stored_ip.ip);
            ESP_LOGI("config", "Loaded smart plug IP from flash: %s", stored_ip.ip);
          } else {
            ESP_LOGI("config", "No saved IP found, using default: %s", id(smart_plug_ip).c_str());
          }
      # FIX #12: ap_mode_blink entfernt - das Script war nach dem Umzug auf
      # die Display-Variante nur noch eine leere Busy-Loop ohne jede Wirkung.
      - delay: 100ms

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf

psram:
  mode: octal   # use octal for at least 8MB PSRAM (2MB use quad)
  speed: 80MHz

# FIX #8/NVS: Slider-Werte werden jetzt persistiert (restore_value: true bei
# den number-Templates unten). Damit haeufige Encoder-Aenderungen am ECO-Level
# den NVS nicht unnoetig abnutzen, werden Preference-Writes gesammelt und nur
# alle 5 Minuten tatsaechlich geschrieben. (ESPHome-Default waere 60s.)
preferences:
  flash_write_interval: 5min

# === Modularer Aufbau =====================================================
# Der komplette Grafik-/Display-Teil (SPI-Bus, Display-Renderer, Fonts,
# Farben und der Display-Brightness-Regler) liegt ausgelagert in:
#   esphome-hotcirc_gui.yaml
# ESPHome fuehrt die Pakete vor der Validierung zusammen, daher koennen
# beide Dateien gegenseitig auf IDs zugreifen (z. B. disp1, outlet_temp).
# FIX #17: Forward-Slashes statt Backslashes - Backslash-Pfade funktionieren
# nur unter Windows und brechen den Build im HA-Add-on / unter Linux.
packages:
  gui:     !include packages/esphome-hotcirc_gui.yaml
  dimming: !include packages/esphome-hotcirc_dimming.yaml

external_components:
  - source:
      type: local
      path: !secret local_path
    components: [esphome_hotcirc]

logger:
  level: INFO
  logs:
    dallas.temp.sensor: INFO
    http_request.idf: INFO
    learning: INFO  # set to debug to show learning matrix in logs
    # FIX #20: Komponenten-Tag vereinheitlicht - alle Controller-Logs laufen
    # jetzt unter "hotcirc" (der alte Zweit-Tag "hotwater" existiert nicht mehr)
    hotcirc: INFO
    wifi: INFO
    dim: INFO

api:
  reboot_timeout: 600min

ota:
  platform: esphome

web_server:
  version: 3
  port: 80
  include_internal: false     # don't expose internal handlers

wifi:
# Uncomment this if you have entered your credentials in the secrets.yaml
# anyway at least the api_encryption_key: section must be present in the secrets.yaml
#  ssid: !secret wifi_ssid
#  password: !secret wifi_password
  power_save_mode: NONE
  ap:
    ssid: "ESPhome-HotCirc"
  reboot_timeout: 0s

  on_connect:
    - globals.set:
        id: wifi_connected
        value: 'true'

  on_disconnect:
    - globals.set:
        id: wifi_connected
        value: 'false'

captive_portal:

# HTTP request component for smart plug control
http_request:
  id: http_client
  timeout: 1s  # Cap loop stalls when the plug is slow/unreachable (was 2s)

# Global variable to store smart plug IP address (runtime only)
globals:
  - id: smart_plug_ip
    type: std::string
    restore_value: no  # We'll handle persistence manually
    initial_value: '"192.168.1.100"'  # Default IP address
  - id: wifi_connected
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: smart_plug_connected
    type: bool
    restore_value: no
    initial_value: 'false'
  # FIX #21: Entprellt die Online/Offline-Erkennung. Der BK7231N-Plug lehnt
  # gelegentlich einen einzelnen TCP-Connect ab (esp-tls select() timeout),
  # erholt sich aber im naechsten 60-s-Check. Erst nach OFFLINE_THRESHOLD
  # aufeinanderfolgenden Fehlern wird der Plug als OFFLINE gemeldet - das
  # eliminiert das transiente Log-Rauschen.
  - id: plug_fail_count
    type: int
    restore_value: no
    initial_value: '0'
  # Touch feedback globals
  - id: touch_indicator_x
    type: int
    restore_value: no
    initial_value: '-1'
  - id: touch_indicator_y
    type: int
    restore_value: no
    initial_value: '-1'
  - id: touch_indicator_time
    type: unsigned long
    restore_value: no
    initial_value: '0'
  # ECO level change feedback
  - id: eco_change_time
    type: unsigned long
    restore_value: no
    initial_value: '0'
  # Aktuelle Seite: false = page_main, true = page_heatmap
  - id: on_heatmap_page
    type: bool
    restore_value: no
    initial_value: 'false'
  # FIX #3: speichert einen millis()-Zeitstempel, kein Encoder-"Value".
  # War vorher `int` namens last_encoder_value - nach 24,8 Tagen Uptime
  # kippte der Wert ins Negative und der Debounce lief Amok. Jetzt uint32_t
  # (gleiche Breite wie millis()), Differenzbildung ist damit rollover-sicher.
  - id: last_encoder_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

# === Sensors & Temperature Probes ===
one_wire:
- platform: gpio
  id: ow_bus0
  pin:
    number: GPIO39
    mode:
      input: true
      pullup: true

- platform: gpio
  id: ow_bus1
  pin:
    number: GPIO40
    mode:
      input: true
      pullup: true

sensor:
  - platform: dallas_temp
    one_wire_id: ow_bus0
    address: 0x0
    name: "Outlet Temperature"
    id: outlet_temp
    update_interval: 1s
    accuracy_decimals: 2
    filters:
      - sliding_window_moving_average:  # Smooth out sensor noise
          window_size: 3
          send_every: 1

  - platform: dallas_temp
    one_wire_id: ow_bus1
    address: 0x0
    name: "Return Temperature"
    id: return_temp
    update_interval: 1s
    accuracy_decimals: 2
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1

  - platform: wifi_signal
    name: "HotCirc WiFi Signal"
    id: wifi_signal_sensor
    update_interval: 60s

  # Last pump cycle energy consumption
  # FIX #1: state_class war "total_increasing" - der Wert ist aber PRO ZYKLUS
  # und faellt zwischen Zyklen. Home Assistant interpretiert jeden Rueckgang
  # bei total_increasing als Zaehler-Reset und blaeht das Energie-Dashboard
  # auf. "measurement" ist die korrekte Klasse fuer einen Momentanwert.
  # Der delta-Filter verhindert zusaetzlich, dass alle 5 s der identische
  # Wert in die HA-Datenbank gespammt wird.
  - platform: template
    name: "Last Cycle Energy"
    id: last_cycle_energy
    update_interval: 5s
    lambda: |-
      return id(hotwater).get_last_cycle_energy();
    unit_of_measurement: "kWh"
    accuracy_decimals: 4
    device_class: energy
    state_class: measurement
    icon: "mdi:lightning-bolt"
    filters:
      - delta: 0.0001

  # Last pump cycle duration
  - platform: template
    name: "Last Cycle Duration"
    id: last_cycle_duration
    update_interval: 5s
    lambda: |-
      return id(hotwater).get_last_cycle_duration();
    unit_of_measurement: "s"
    accuracy_decimals: 0
    icon: "mdi:timer-outline"
    filters:
      - delta: 1

  - platform: rotary_encoder
    name: "Rotary Encoder"
    id: rotary_encoder_sensor
    pin_a:
      number: GPIO5
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO6
      mode:
        input: true
        pullup: true
    resolution: 4
    internal: true
    on_clockwise:
      - lambda: |-
          // Display schlaeft? -> nur aufwecken, diesen Schritt ignorieren
          if (id(disp_stage) != 0) { id(hotcirc_display_wake).execute(); return; }
          // Wach: Drehen haelt das Display wach
          id(last_active_ms) = millis();
          // Debounce: Events innerhalb 50ms nach letztem Event ignorieren
          // FIX #3: rollover-sichere uint32-Differenz gegen last_encoder_ms
          uint32_t now = millis();
          if (now - id(last_encoder_ms) < 50) return;
          id(last_encoder_ms) = now;
          float new_eco = id(eco_level_config).state + 5.0;
          if (new_eco > 255) new_eco = 255;
          id(eco_level_config).publish_state(new_eco);
          id(eco_change_time) = millis();
          ESP_LOGI("encoder", "ECO+ → %.0f", new_eco);
    on_anticlockwise:
      - lambda: |-
          // Display schlaeft? -> nur aufwecken, diesen Schritt ignorieren
          if (id(disp_stage) != 0) { id(hotcirc_display_wake).execute(); return; }
          // Wach: Drehen haelt das Display wach (Inaktivitaet zuruecksetzen)
          id(last_active_ms) = millis();
          uint32_t now = millis();
          if (now - id(last_encoder_ms) < 50) return;
          id(last_encoder_ms) = now;
          float new_eco = id(eco_level_config).state - 5.0;
          if (new_eco < 0) new_eco = 0;
          id(eco_level_config).publish_state(new_eco);
          id(eco_change_time) = millis();
          ESP_LOGI("encoder", "ECO- → %.0f", new_eco);


text_sensor:
  # FIX #7: Das Trigger->String-Mapping lebt jetzt EINMAL im C++-Component
  # (get_pump_trigger_str()). Die frueheren drei handgepflegten Kopien waren
  # bereits auseinandergedriftet ("Schedule" im Log vs. "Scheduled" hier).
  - platform: template
    name: "Pump Status"
    id: pump_status
    icon: "mdi:information-outline"
    update_interval: 1s
    lambda: |-
      if (id(hotwater).pump_running_) {
        return std::string("Running: ") + id(hotwater).get_pump_trigger_str();
      } else if (!id(hotwater).pump_enabled_) {
        return std::string("Disabled");
      } else {
        return std::string("Standby");
      }

  - platform: template
    name: "System Mode"
    id: system_mode
    icon: "mdi:home-automation"
    update_interval: 10s
    lambda: |-
      if (id(hotwater).is_vacation_mode()) {
        return {"Vacation Mode"};
      } else {
        return {"Normal"};
      }

  - platform: template
    name: "Learning Matrix JSON"
    id: learning_matrix_json
    update_interval: 300s  # Update every 5 minutes for learning changes
                           # Also updates immediately when ECO level changes (see ECO Level number component)
    internal: false  # Make it accessible via web/API
    lambda: |-
      // Build JSON string from learning matrix including ECO level
      std::string json = "{\"eco_level\":";
      json += std::to_string((int)id(hotwater).SCHEDULE_THRESHOLD);
      json += ",\"days\":[";

      const char* dayNames[] = {"Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"};

      for (int day = 0; day < 7; day++) {
        if (day > 0) json += ",";
        json += "{\"name\":\"" + std::string(dayNames[day]) + "\",\"values\":[";

        for (int slot = 0; slot < 48; slot++) {
          if (slot > 0) json += ",";
          // Use std::to_string for proper conversion
          json += std::to_string((int)id(hotwater).learn_[day][slot]);
        }

        json += "]}";
      }

      json += "]}";

      return json;

switch:
  # Smart plug control via HTTP (replaces GPIO relay)
  # IP address can be configured via "Smart Plug IP Address" text input
  # FIX #19: das leere state-Lambda entfernt - "optimistic: true" uebernimmt
  # die State-Verwaltung, ein Lambda daneben ist widerspruechlich.
  # FIX #18: HTTP-Requests nur absetzen, wenn WiFi verbunden ist. Vorher
  # feuerte restore_mode ALWAYS_OFF beim Boot einen POST ins Leere
  # (garantierter Fehler-Log bei jedem Start). Ein uebersprungenes Kommando
  # ist unkritisch: check_smart_plug_script gleicht den Relaiszustand ohnehin
  # alle 60 s ab und sendet den Soll-Zustand bei Abweichung erneut.
  - platform: template
    id: pump_relay
    name: "Pump Relay (HTTP)"
    restore_mode: ALWAYS_OFF  # Safety: ensure pump is off on boot
    internal: true  # Hide from UI - controlled internally
    optimistic: true  # Assume state changes succeed
    turn_on_action:
      - if:
          condition:
            lambda: 'return id(wifi_connected);'
          then:
            - http_request.post:
                url: !lambda |-
                  return "http://" + id(smart_plug_ip) + "/switch/relay/turn_on";
                body: ""
                on_error:
                  # FIX #21: Statt bis zu 60 s auf die periodische Reconciliation
                  # zu warten, hier nach 3 s gezielt nachpruefen. delay yieldet
                  # (nicht-blockierend); check_smart_plug_script sendet bei
                  # plug=OFF/expected=ON den Befehl erneut. 60-s-Interval bleibt
                  # als Backstop, falls auch der schnelle Retry scheitert.
                  - logger.log:
                      format: "HTTP Error: turn ON failed - fast reconcile queued"
                      level: ERROR
                      tag: "smart_plug"
                  - delay: 3s
                  - script.execute: check_smart_plug_script
          else:
            - logger.log:
                format: "WiFi down - ON command deferred, reconciliation will re-send"
                level: WARN
                tag: "smart_plug"
    turn_off_action:
      - if:
          condition:
            lambda: 'return id(wifi_connected);'
          then:
            - http_request.post:
                url: !lambda |-
                  return "http://" + id(smart_plug_ip) + "/switch/relay/turn_off";
                body: ""
                on_error:
                  # FIX #21: siehe turn_on_action - schneller Reconcile nach 3 s.
                  - logger.log:
                      format: "HTTP Error: turn OFF failed - fast reconcile queued"
                      level: ERROR
                      tag: "smart_plug"
                  - delay: 3s
                  - script.execute: check_smart_plug_script
          else:
            - logger.log:
                format: "WiFi down - OFF command deferred, reconciliation will re-send"
                level: WARN
                tag: "smart_plug"

  # Master enable/disable switch for pump operation
  - platform: template
    name: "Circulation Pump Enable"
    id: pump_enable_switch
    icon: "mdi:pump"
    restore_mode: RESTORE_DEFAULT_ON  # Default to enabled on boot
    optimistic: true
    lambda: |-
      return id(hotwater).pump_enabled_;
    turn_on_action:
      - lambda: |-
          ESP_LOGI("pump_switch", "Pump ENABLED via Web UI");
          id(hotwater).enable_pump();
    turn_off_action:
      - lambda: |-
          ESP_LOGI("pump_switch", "Pump DISABLED via Web UI");
          id(hotwater).disable_pump();

button:
  - platform: template
    name: "Run Circulation Pump"
    icon: "mdi:pump"
    on_press:
      - lambda: |-
          ESP_LOGI("pump_button", "Web UI: Pump run requested");
          id(hotwater).run_pump();

  - platform: template
    name: "Save Learning Matrix"
    icon: "mdi:content-save"
    on_press:
      - lambda: |-
          ESP_LOGI("save_button", "Web UI: Save learning matrix requested");
          id(hotwater).save_learning_matrix();

  - platform: template
    name: "Test Smart Plug Connection"
    icon: "mdi:lan-connect"
    on_press:
      - script.execute: test_smart_plug_script

  - platform: factory_reset
    id: factory_reset_btn
    name: Factory Reset

  - platform: safe_mode
    id: button_safe_mode
    name: Safe Mode Boot

text:
  - platform: template
    name: "Smart Plug IP Address"
    id: smart_plug_ip_input
    icon: "mdi:ip-network"
    min_length: 7
    max_length: 15
    mode: text
    lambda: |-
      // Return current value from global variable
      return id(smart_plug_ip);
    set_action:
      - lambda: |-
          id(smart_plug_ip) = x;

          // Structure to store IP address in flash (must be trivially copyable)
          struct IpAddressStorage {
            char ip[16];  // Max 15 chars for IP + null terminator
          };

          // Save to flash using preferences
          auto pref = global_preferences->make_preference<IpAddressStorage>(fnv1_hash("plug_ip"));
          IpAddressStorage stored_ip;
          strncpy(stored_ip.ip, x.c_str(), sizeof(stored_ip.ip) - 1);
          stored_ip.ip[sizeof(stored_ip.ip) - 1] = '\0';  // Ensure null termination

          if (pref.save(&stored_ip)) {
            ESP_LOGI("config", "Smart plug IP address changed to: %s (saved to flash)", x.c_str());
          } else {
            ESP_LOGE("config", "Failed to save smart plug IP to flash!");
          }
    entity_category: config

# FIX #8: restore_value: true bei allen Konfig-Slidern. Vorher gingen alle
# Nutzer-Einstellungen bei jedem Reboot verloren (Reset auf initial_value).
# Die on_value-Aktion feuert beim Restore ebenfalls, damit landet der
# persistierte Wert auch im C++-Component. NVS-Wear ist durch
# preferences.flash_write_interval (oben, 5 min) entschaerft.
# Hinweis: initial_value greift nur noch beim allerersten Boot; die Werte im
# esphome_hotcirc:-Block unten dienen als Fallback-Defaults, bis on_value
# feuert. Beide Stellen konsistent halten.
number:
  - platform: template
    name: "Outlet Rise Threshold"
    id: outlet_rise_config
    icon: "mdi:thermometer-chevron-up"
    min_value: 0.5
    max_value: 3.0
    step: 0.1
    initial_value: 1.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    mode: slider
    on_value:
      - lambda: |-
          id(hotwater).temp_rise_threshold_ = x;
          ESP_LOGI("config", "Outlet rise threshold changed to %.1f°C", x);

  - platform: template
    name: "Return Rise Target"
    id: return_rise_config
    icon: "mdi:thermometer-alert"
    min_value: 3.0
    max_value: 15.0
    step: 0.5
    initial_value: 5.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    mode: slider
    on_value:
      - lambda: |-
          id(hotwater).return_rise_threshold_ = x;
          ESP_LOGI("config", "Return rise target changed to %.1f°C", x);

  - platform: template
    name: "Disinfection Temp Rise"
    id: disinfection_temp_config
    icon: "mdi:water-boiler"
    min_value: 8.0
    max_value: 20.0
    step: 1.0
    initial_value: 10.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    mode: slider
    on_value:
      - lambda: |-
          id(hotwater).disinfection_temp_threshold_ = x;
          ESP_LOGI("config", "Disinfection temperature rise changed to %.1f°C", x);

  - platform: template
    name: "Minimum Return Temp"
    id: min_return_temp_config
    icon: "mdi:thermometer-low"
    min_value: 20.0
    max_value: 40.0
    step: 1.0
    initial_value: 30.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "°C"
    mode: slider
    on_value:
      - lambda: |-
          id(hotwater).min_return_temp_ = x;
          ESP_LOGI("config", "Minimum return temperature changed to %.1f°C", x);

  - platform: template
    name: "Pump Flow Rate"
    id: pump_flow_rate_config
    icon: "mdi:water-pump"
    min_value: 10.0
    max_value: 40.0
    step: 1.0
    initial_value: 20.0
    restore_value: true
    optimistic: true
    unit_of_measurement: "L/min"
    mode: slider
    on_value:
      - lambda: |-
          id(hotwater).pump_flow_rate_ = x;
          ESP_LOGI("config", "Pump flow rate changed to %.1f L/min", x);

  - platform: template
    name: "ECO Level"
    id: eco_level_config
    icon: "mdi:leaf"
    min_value: 0
    max_value: 255
    step: 5
    initial_value: 120
    restore_value: true
    optimistic: true
    mode: slider
    on_value:
      - lambda: |-
          // ECO level: higher value = more eco-friendly = pump runs less often
          // Value directly matches learning matrix values shown in heatmap
          // Range 0-255: 0 = always run, 255 = only run when absolutely certain
          id(hotwater).SCHEDULE_THRESHOLD = (uint8_t)x;
          ESP_LOGI("config", "ECO level changed to %.0f (threshold = %d)", x, (uint8_t)x);
          // Immediately update the JSON sensor so heatmap shows new trigger thresholds
          id(learning_matrix_json).update();

# LCD Power: GPIO17 output - required by esphome_hotcirc component
# No name = not exposed to web interface
# Set HIGH in on_boot via output.turn_on (FIX #14)
output:
  - platform: gpio
    pin: GPIO17
    id: lcd_power
    inverted: false

i2c:
  sda: GPIO1
  scl: GPIO3
  id: touch_i2c

touchscreen:
  platform: cst816
  id: my_touchscreen
  display: disp1
  # WICHTIG: Interrupt-Leitung aktiviert. Ohne sie wird der cst816 nur alle
  # 50ms gepollt (kurze Taps gehen verloren) und der erste Tap aus dem Standby
  # weckt nur den Controller, ohne ein Event zu melden -> "mehrere Touches".
  # Falls Touch danach GAR NICHT mehr reagiert, ist GPIO4 auf deinem Board
  # falsch: dann diese Zeile wieder auskommentieren und Pin im Schaltplan pruefen.
  interrupt_pin: GPIO4
  reset_pin: GPIO2
  update_interval: 50ms
  on_touch:
    - lambda: |-
        id(last_active_ms) = millis();
        if (id(disp_stage) != 0) {
          // War gedimmt/dark: hier ZUVERLAESSIG aufwecken (nicht ueber den
          // unzuverlaessigen LVGL on_click) und den zugehoerigen Klick schlucken.
          id(hotcirc_display_wake).execute();
          id(swallow_click) = true;
        } else {
          id(swallow_click) = false;   // wach: normaler Klick soll wirken
        }

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
    id: hw_button
    name: "Manual Pump Button"
    filters:
      - delayed_on: 50ms  # Debounce
    internal: true
    on_click:
      # Druck auf Displaygehäuse: Pumpe manuell starten
      min_length: 50ms
      max_length: 1000ms
      then:
        - lambda: |-
            // Display sofort wecken UND Aktion direkt ausfuehren (kein 2. Druck)
            id(hotcirc_display_wake).execute();
            ESP_LOGI("button", "HW button - run pump");
            id(hotwater).run_pump();

  # Smart plug connectivity status
  - platform: template
    name: "Smart Plug Connected"
    id: smart_plug_status
    icon: "mdi:lan-connect"
    device_class: connectivity
    lambda: |-
      return id(smart_plug_connected);


# FIX #20 (kosmetisch, fuers veroeffentlichte Projekt): Geraet steht in
# Deutschland -> Europe/Berlin und de-Pool statt Amsterdam/nl-Pool.
# (Gleicher UTC-Offset, aber konsistent.)
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Berlin
    servers: ["0.de.pool.ntp.org", "1.de.pool.ntp.org", "2.de.pool.ntp.org"]
    on_time_sync:
      - logger.log: "Time synchronized"

# Check smart plug connectivity AND relay state every 60 seconds.
# On state mismatch the last commanded state is re-sent (controller is master).
# FIX #18: nur bei bestehender WiFi-Verbindung - vorher lief der Check auch
# offline und produzierte alle 60 s einen Fehler-Log.
interval:
  - interval: 60s
    then:
      - if:
          condition:
            lambda: 'return id(wifi_connected);'
          then:
            - script.execute: check_smart_plug_script

script:
  # FIX #12: ap_mode_blink (leere Busy-Loop, LED-Blinken existiert auf der
  # Display-Variante nicht mehr) ersatzlos entfernt, inkl. aller Aufrufer.

  # Hinweis: test_ und check_smart_plug_script teilen bewusst Struktur - der
  # Test-Button liefert explizites SUCCESS/FAILED-Feedback im Log, der
  # periodische Check loggt nur Zustandswechsel und macht die Reconciliation.
  - id: test_smart_plug_script
    mode: single
    then:
      - logger.log:
          format: "Testing smart plug connection at: %s"
          args: [ 'id(smart_plug_ip).c_str()' ]
          level: INFO
          tag: "smart_plug"
      - delay: 100ms  # Allow watchdog to be fed
      - http_request.get:
          url: !lambda 'return "http://" + id(smart_plug_ip) + "/switch/relay";'
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGE("smart_plug", "FAILED! HTTP status %d", response->status_code);
                    id(smart_plug_connected) = false;
                    id(smart_plug_status).publish_state(false);
                    return;
                  }
                  ESP_LOGI("smart_plug", "SUCCESS! Smart plug is reachable");
                  id(smart_plug_connected) = true;
                  id(smart_plug_status).publish_state(true);

                  // Report actual relay state vs. expected state
                  bool expected_state = id(pump_relay).state;
                  if (body.find("\"value\":true") != std::string::npos) {
                    ESP_LOGI("smart_plug", "Relay state: ON (expected: %s)", expected_state ? "ON" : "OFF");
                  } else if (body.find("\"value\":false") != std::string::npos) {
                    ESP_LOGI("smart_plug", "Relay state: OFF (expected: %s)", expected_state ? "ON" : "OFF");
                  } else {
                    ESP_LOGW("smart_plug", "Could not parse relay state from response: %s", body.c_str());
                  }
          on_error:
            then:
              - lambda: |-
                  ESP_LOGE("smart_plug", "FAILED! Smart plug is not reachable");
                  id(smart_plug_connected) = false;
                  id(smart_plug_status).publish_state(false);

  - id: check_smart_plug_script
    mode: single
    then:
      # Query the relay endpoint directly: one request checks BOTH
      # reachability AND actual relay state.
      # Response body example: {"id":"switch-relay","state":"ON","value":true}
      - http_request.get:
          url: !lambda 'return "http://" + id(smart_plug_ip) + "/switch/relay";'
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  // FIX #21: 2 aufeinanderfolgende Fehler noetig, bevor OFFLINE
                  // gemeldet wird. Ein unerwarteter Status zaehlt wie ein
                  // Transport-Fehler, markiert aber nicht sofort offline.
                  const int OFFLINE_THRESHOLD = 2;

                  if (response->status_code != 200) {
                    id(plug_fail_count)++;
                    if (id(plug_fail_count) >= OFFLINE_THRESHOLD && id(smart_plug_connected)) {
                      ESP_LOGW("smart_plug", "Smart plug is now OFFLINE (HTTP status %d, %d consecutive fails)",
                               response->status_code, id(plug_fail_count));
                      id(smart_plug_connected) = false;
                      id(smart_plug_status).publish_state(false);
                    } else {
                      ESP_LOGD("smart_plug", "Unexpected HTTP status %d (fail #%d) - tolerating",
                               response->status_code, id(plug_fail_count));
                    }
                    return;
                  }

                  // --- Reachability OK: Fehlerzaehler zuruecksetzen ---
                  id(plug_fail_count) = 0;
                  if (!id(smart_plug_connected)) {
                    ESP_LOGI("smart_plug", "Smart plug is now ONLINE");
                  }
                  id(smart_plug_connected) = true;
                  id(smart_plug_status).publish_state(true);

                  // --- State verification ---
                  bool plug_state;
                  if (body.find("\"value\":true") != std::string::npos) {
                    plug_state = true;
                  } else if (body.find("\"value\":false") != std::string::npos) {
                    plug_state = false;
                  } else {
                    ESP_LOGW("smart_plug", "Could not parse relay state from response: %s", body.c_str());
                    return;
                  }

                  bool expected_state = id(pump_relay).state;
                  if (plug_state != expected_state) {
                    // Plug and controller disagree (e.g. plug rebooted or a
                    // switch command was lost). Controller is master:
                    // re-send the command to restore the expected state.
                    ESP_LOGW("smart_plug", "State mismatch: plug=%s, expected=%s -> re-sending command",
                             plug_state ? "ON" : "OFF", expected_state ? "ON" : "OFF");
                    if (expected_state) {
                      id(pump_relay).turn_on();
                    } else {
                      id(pump_relay).turn_off();
                    }
                  }
          on_error:
            then:
              - lambda: |-
                  // FIX #21: transiente Connect-Fehler (esp-tls select() timeout)
                  // tolerieren - erst nach OFFLINE_THRESHOLD Fehlern melden.
                  const int OFFLINE_THRESHOLD = 2;
                  id(plug_fail_count)++;
                  if (id(plug_fail_count) >= OFFLINE_THRESHOLD) {
                    if (id(smart_plug_connected)) {
                      ESP_LOGW("smart_plug", "Smart plug is now OFFLINE (after %d consecutive fails)",
                               id(plug_fail_count));
                    }
                    id(smart_plug_connected) = false;
                    id(smart_plug_status).publish_state(false);
                  } else {
                    ESP_LOGD("smart_plug", "Transient plug error #%d - tolerating, retry next cycle",
                             id(plug_fail_count));
                  }


# === Instantiate HotCirc Component ===
# FIX #6: anti_stagnation_interval entfernt - der Parameter wurde vom Code
# nicht mehr ausgewertet (Anti-Stagnation laeuft auf fixem Wochenplan:
# Sonntag 03:00, siehe check_anti_stagnation_() im Component).
# Hinweis zu den Zahlenwerten: sie dienen als Boot-Defaults; nach dem ersten
# Slider-Restore ueberschreiben die number-Templates oben diese Werte.
esphome_hotcirc:
  id: hotwater
  outlet_sensor: outlet_temp
  return_sensor: return_temp
  pump_switch: pump_relay
  time_source: sntp_time
  button: hw_button
  # Note: led_green and led_yellow removed - Display shows status instead
  outlet_rise: 1.0      # Minimum temperature RISE to detect water draw (°C)
                        # Reduced from 1.5 to match slower temperature response in 40cm pipe
  return_rise: 5.0      # Target return temperature rise for normal operation (°C)
  disinfection_temp_rise: 10.0  # Temperature rise above baseline indicating disinfection cycle (°C)
                                # When detected, pump runs maximum time to disinfect entire system
  min_return_temp: 30.0  # Minimum return temperature to start pump (°C)
                         # If return temp is above this, water at taps is already hot enough
                         # Prevents unnecessary pump runs, saves energy
  pump_flow_rate: 20.0   # Pump flow rate in liters per minute (L/min)
                         # Measured value: 20 L/min
                         # Used for energy consumption calculation
  anti_stagnation_runtime: 15       # Anti-stagnation run time in seconds (default: 15 seconds)
                                    # Short run is enough to move impeller and prevent seizure
  thermal_stagnation_delta: 2.0    # °C: outlet - return < 2°C → Flush
  thermal_stagnation_runtime: 10   # Sekunden Pumpenlauf
  thermal_stagnation_min_return: 40.0  # °C Mindestrücklauftemperatur
  thermal_stagnation_cooldown: 1800  # 30 min Sperrzeit nach Flush
